version: "3"

vars:
  SUDO: '' # Modifiez en 'sudo' si nécessaire sur Synology
  # Détection automatique de la commande compose (Synology vs PC)
  DOCKER_COMPOSE:
    sh: docker-compose version >/dev/null 2>&1 && echo "docker-compose" || echo "docker compose"

tasks:
  install:
    desc: Installe les dépendances du projet (Frontend + Login AWS)
    cmds:
      - cd frontend && npm ci

  build:
    desc: Build de l'application Angular
    cmds:
      - task: generate-version
      - cd frontend && npm run build

  start:
    desc: Démarre l'application via Docker Compose
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} up -d"

  stop:
    desc: Arrête l'application
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} down"

  restart:
    desc: Redémarre l'application (utile après un build)
    cmds:
      - task: stop
      - task: start

  status:
    desc: Affiche l'état des services
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} ps"

  build-and-start:
    desc: Construit l'image Docker et redémarre l'application
    cmds:
      - |
        BUILD_DATE=$(date +%Y-%m-%d_%H:%M) \
        GIT_HASH=$(git rev-parse --short HEAD || echo "no-git") \
        {{.SUDO}} {{.DOCKER_COMPOSE}} up -d --build

  upsert-admin:
    desc: Crée ou met à jour un utilisateur administrateur (Docker)
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} exec allergy-track /usr/local/bin/pocketbase superuser upsert {{.EMAIL}} {{.PASS}} --dir=/srv/pb_data"
    vars:
      EMAIL: 'admin@allergy-track.local'
      PASS: 'admin123456'

  sync-mocks:
    desc: Sync mock users from frontend to backend
    cmds:
      - |
        node -e "
        const fs = require('fs');
        const tsFile = 'frontend/src/app/services/adapters/auth/local-storage/mock-users.data.ts';
        const jsFile = 'backend/pb_hooks/mock-users.json';
        let content = fs.readFileSync(tsFile, 'utf8');
        
        content = content.replace(/^import .*/gm, '');
        content = content.replace(/: [A-Z][a-zA-Z]*(\[\])?/g, ''); 
        
        const extractArray = (name) => {
          const regex = new RegExp('export const ' + name + '\\\\s*=\\\\s*([\\\\s\\\\S]*?);', 'm');
          const match = content.match(regex);
          if (!match) throw new Error('Constant ' + name + ' not found');
          return eval(match[1]);
        };

        const data = {
          users: extractArray('MOCK_USERS'),
          profiles: extractArray('MOCK_PROFILES'),
          accesses: extractArray('MOCK_ACCESSES')
        };
        
        fs.writeFileSync(jsFile, JSON.stringify(data, null, 2));
        console.log('Synchronized ' + jsFile + ' (relational)');
        "

  upsert-mock-users:
    desc: Upsert mock users in PocketBase
    deps: [sync-mocks]
    cmds:
      - task: start
      - docker cp backend/pb_hooks/mocks_manager.pb.js $({{.DOCKER_COMPOSE}} ps -q allergy-track):/srv/pb_hooks/
      - docker cp backend/pb_hooks/mock-users.json $({{.DOCKER_COMPOSE}} ps -q allergy-track):/srv/pb_hooks/
      - docker cp backend/pb_migrations/. $({{.DOCKER_COMPOSE}} ps -q allergy-track):/srv/pb_migrations/
      - "{{.DOCKER_COMPOSE}} exec allergy-track /usr/local/bin/pocketbase migrate up --dir=/srv/pb_data"
      - "{{.DOCKER_COMPOSE}} exec allergy-track /usr/local/bin/pocketbase upsert-mock-data --dir=/srv/pb_data"

  delete-mock-users:
    desc: Supprime les utilisateurs de test de la base de données
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} exec allergy-track /usr/local/bin/pocketbase delete-mock-data --dir=/srv/pb_data"

  reset-db:
    desc: Réinitialise la base de données (Volume nommé Docker)
    cmds:
      - task: stop
      - "{{.SUDO}} docker volume rm allergy-track_pb_data"
      - task: build-and-start

  test-api:
    desc: Exécute la suite de tests E2E complète de l'API
    cmds:
      - |
        HEALTH=$(curl -s http://localhost:8090/api/health | grep -o '"code":200')
        if [ -z "$HEALTH" ]; then
          echo "❌ L'API n'est pas démarrée. Lancez 'task start' d'abord."
          exit 1
        fi
        bash tests/validate_api.sh

  test-docker:
    desc: Construit et teste l'image Docker localement
    cmds:
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} build"
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} up -d"
      - "echo 'Waiting for PocketBase to start...'"
      - sleep 5
      - curl -f http://localhost:8090/ || ({{.SUDO}} {{.DOCKER_COMPOSE}} logs && exit 1)
      - "echo '✅ Test Docker réussi !'"
      - "{{.SUDO}} {{.DOCKER_COMPOSE}} down"

  update:
    desc: Met à jour l'application (git pull + rebuild Docker) sur le Synology
    cmds:
      - git pull
      - |
        BUILD_DATE=$(date +%Y-%m-%d_%H:%M) \
        GIT_HASH=$(git rev-parse --short HEAD || echo "no-git") \
        {{.SUDO}} {{.DOCKER_COMPOSE}} up -d --build

  generate-version:
    internal: true
    cmds:
      - |
        echo "export const VERSION = { buildDate: '$(date +%Y-%m-%d_%H:%M)', hash: '$(git rev-parse --short HEAD || echo "no-git")' };" > frontend/src/environments/version.ts
