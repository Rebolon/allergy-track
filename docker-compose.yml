services:
  pocketbase:
    image: elestio/pocketbase:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./backend/pb_data:/pb_data
      - ./frontend/dist/app/browser:/pb_public
      - ./backend/pb_hooks:/pb_hooks
      - ./backend/pb_migrations:/pb_migrations
      - ./backend/schema.json:/pb_schema.json
    entrypoint: []
    command: 
      - /usr/local/bin/pocketbase
      - serve
      - --http=0.0.0.0:8090
      - --dir=/pb_data
      - --publicDir=/pb_public
      - --hooksDir=/pb_hooks
      - --migrationsDir=/pb_migrations
      - --dev
