services:
  allergy-track:
    build:
      context: .
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
        GIT_HASH: ${GIT_HASH:-unknown}
    image: allergy-track:latest
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/srv/pb_data
    environment:
      - SYNOLOGY_CLIENT_ID=${SYNOLOGY_CLIENT_ID}
      - SYNOLOGY_CLIENT_SECRET=${SYNOLOGY_CLIENT_SECRET}
      - SYNOLOGY_AUTH_URL=${SYNOLOGY_AUTH_URL}
      - SYNOLOGY_TOKEN_URL=${SYNOLOGY_TOKEN_URL}
      - SYNOLOGY_USER_INFO_URL=${SYNOLOGY_USER_INFO_URL}
    # as the Dockerfile handles the structure and entrypoint.

volumes:
  pb_data:
